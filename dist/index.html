<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>Assistente IA Jurídico</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="IA Jurídico" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />

    <!-- Fonts — carrega sem bloquear -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!--
      CORREÇÃO 1: removido atributo "crossorigin" dos assets abaixo.
      O Vite adiciona crossorigin em builds de módulo ES, mas no Capacitor
      o WebView bloqueia silenciosamente scripts com CORS sem os headers corretos.
    -->
    <script type="module" src="/assets/index-B0SMdl17.js"></script>
    <link rel="stylesheet" href="/assets/index-ML5Kmu-w.css">
  
  <!-- PWA Android -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="mobile-web-app-capable" content="yes" />
</head>
  <body>
    <div id="root"></div>

    <script>
      // CORREÇÃO 2: não registra Service Worker dentro do app nativo Capacitor.
      // O SW interfere com o sistema de arquivos local do WebView e pode
      // travar a carga do bundle JS na primeira inicialização.
      var isCapacitor = (typeof window !== 'undefined') &&
                        (window.Capacitor !== undefined ||
                         navigator.userAgent.indexOf('wv') !== -1 && navigator.userAgent.indexOf('Android') !== -1);

      if ('serviceWorker' in navigator && !isCapacitor) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('sw.js').catch(function() {});
        });
      }

      // Exibe erros JS na tela em vez de tela branca muda — para diagnóstico
      window.addEventListener('error', function(e) {
        var root = document.getElementById('root');
        if (root && root.childElementCount === 0) {
          root.innerHTML =
            '<div style="background:#0d1520;color:#f87171;font-family:monospace;padding:24px;min-height:100vh">' +
            '<h2 style="margin:0 0 12px">Erro na inicialização</h2>' +
            '<pre style="white-space:pre-wrap;font-size:12px">' + (e.message || e) + '\n' + (e.filename || '') + ':' + (e.lineno || '') + '</pre>' +
            '</div>';
        }
      });
    </script>
  
  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
